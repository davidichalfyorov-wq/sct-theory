name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check analysis/sct_tools/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install core dependencies
        run: |
          pip install numpy scipy matplotlib sympy mpmath hypothesis \
                     networkx pandas astropy uncertainties SciencePlots \
                     pytest joblib tqdm
      - name: Verify core modules
        working-directory: analysis
        run: |
          python -c "
          import importlib.util, sys
          for name in ['constants', 'form_factors', 'verification']:
              spec = importlib.util.spec_from_file_location(name, f'sct_tools/{name}.py')
              mod = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(mod)
              print(f'{name}: OK')
          print(f'N_s={mod.N_s if hasattr(mod, \"N_s\") else \"n/a\"}')
          "
